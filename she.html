<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Love Website</title>
<style>
body {
    margin: 0;
    font-family: 'Arial';
    background: linear-gradient(135deg, #ffb6c1, #ff69b4);
    overflow: hidden;
    color: white;
    text-align: center;
}

/* floating hearts */
.heart {
    position: absolute;
    font-size: 24px;
    animation: float 6s linear infinite;
}
@keyframes float {
    0% {transform: translateY(100vh) rotate(0deg); opacity: 1;}
    100% {transform: translateY(-10vh) rotate(360deg); opacity: 0;}
}

.container {
    position: relative;
    top: 20vh;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
}

.yes {background: #ff1493; color: white;}
.no {background: #222; color: white;}

h1 {
    font-size: 28px;
    text-shadow: 2px 2px 10px #000;
}

</style>
</head>
<body>

<div class="container" id="main">
    <h1>Ak cheez dikhaon ❤️</h1>
    <button class="yes" onclick="step1Yes()">Yes</button>
    <button class="no" onclick="step1No()">No</button>
</div>

<script>

// floating hearts generator
setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (20 + Math.random()*30) + "px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}, 500);

// STEP 1 YES/NO
function step1Yes(){
document.getElementById("main").innerHTML = `
<h2>💌 I love you more than words can express</h2>
<p>
You are my heart, my soul, my everything.<br>
Every moment with you feels magical.<br>
You complete my world in every way.<br>
I promise to always stand by you.<br>
My love for you grows deeper every day.<br>
You are my forever happiness.<br>
I thank God for you every day.<br>
You are my dream come true.
</p>
<br>
<h3>Can I ask you something?</h3>
<button class='yes' onclick='step2Yes()'>Yes</button>
<button class='no' onclick='step2No()'>No</button>
`;
}

function step1No(){
document.getElementById("main").innerHTML = `
<h2>💔</h2>
<p>Sad... you broke my heart</p>
`;}

function step2Yes(){
document.getElementById("main").innerHTML = `
<h2>Will you marry me Uwaish? 💍</h2>
<button class='yes' onclick='step3Yes()'>Yes</button>
<button class='no' onclick='step3No()'>No</button>
`;
}

function step2No(){
document.getElementById("main").innerHTML = `
<h2>😢💔💔</h2>
<p>So sad...</p>
`;
}

function step3Yes(){
document.getElementById("main").innerHTML = `
<h2>💖💖💖 YESSS! 💖💖💖</h2>
<p>You made my world complete 💕</p>
<h3>Do you love me Uwaish?</h3>
<button class='yes' onclick='loveYes()'>Yes</button>
<button class='no' onclick='loveNo()'>No</button>
`;
}

function step3No(){
document.getElementById("main").innerHTML = `
<h2>💔💔💔</h2>
<p>Heart broken...</p>
`;
}

function loveYes(){
document.getElementById("main").innerHTML = `
<h2>💖 Endless Love 💖</h2>
<p>You are my everything forever 💕</p>
`;
}

function loveNo(){
document.getElementById("main").innerHTML = `
<h2>😢💔😭</h2>
<p>Broken heart...</p>
`;
}

</script>

</body>
</html>
